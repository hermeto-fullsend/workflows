name: Mirror issue
on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
      mirror_issue_number:
        required: true
        type: number

permissions:
  issues: write

# Serialize runs to prevent race conditions on the MIRRORED_ISSUES variable
concurrency: mirror-issue

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      is_mirror: ${{ steps.check.outputs.is_mirror }}
    steps:
      - name: Check mirror label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MIRROR_ISSUE_NUMBER: ${{ inputs.mirror_issue_number }}
        run: |
          if gh issue view "${MIRROR_ISSUE_NUMBER}" --json labels --jq '.labels[].name' -R "${REPO}" | grep -q '^mirror$'; then
            echo "is_mirror=true" >> "${GITHUB_OUTPUT}"
          fi

  validate:
    needs: check
    if: needs.check.outputs.is_mirror == 'true'
    runs-on: ubuntu-latest
    outputs:
      upstream_issue_number: ${{ steps.parse_issue.outputs.upstream_issue_number }}
      fullsend_stage: ${{ steps.parse_issue.outputs.fullsend_stage }}
    steps:
      - name: Fetch mirror issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MIRROR_ISSUE_NUMBER: ${{ inputs.mirror_issue_number }}
        run: |
          gh issue view "${MIRROR_ISSUE_NUMBER}" --json body -R "${REPO}" > mirror_issue.json

      - name: Parse mirror issue
        id: parse_issue
        shell: python3 -u {0}
        run: |
          import json, os, re, sys

          with open("mirror_issue.json") as f:
              issue = json.load(f)

          body = issue["body"] or ""

          upstream = re.findall(r'### Upstream issue number\n\n(\d+)', body)
          stage = re.findall(r'### Starting stage\n\n(\w+)', body)

          if not upstream:
              sys.exit("could not parse upstream issue number")
          if not stage or stage[0] not in ("triage", "code"):
              sys.exit(f"invalid starting stage: {stage[0] if stage else '(not found)'}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"upstream_issue_number={upstream[0]}\n")
              f.write(f"fullsend_stage={stage[0]}\n")

      - name: Check upstream issue is open
        id: check_upstream
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_ISSUE_NUMBER: ${{ steps.parse_issue.outputs.upstream_issue_number }}
        run: |
          state=$(gh issue view "${UPSTREAM_ISSUE_NUMBER}" --json state --jq '.state' -R "${UPSTREAM_REPO}")
          if [ "${state}" != "OPEN" ]; then
            echo "error=Upstream issue ${UPSTREAM_REPO}#${UPSTREAM_ISSUE_NUMBER} is ${state}" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

  mirror:
    needs: [check, validate]
    if: needs.check.outputs.is_mirror == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch upstream issue
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_ISSUE_NUMBER: ${{ needs.validate.outputs.upstream_issue_number }}
        run: |
          gh issue view "${UPSTREAM_ISSUE_NUMBER}" --json title,body -R "${UPSTREAM_REPO}" > upstream_issue.json

      - name: Edit mirror issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MIRROR_ISSUE_NUMBER: ${{ inputs.mirror_issue_number }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_ISSUE_NUMBER: ${{ needs.validate.outputs.upstream_issue_number }}
        run: |
          new_title=$(jq -r '"[Fullsend#\(env.UPSTREAM_ISSUE_NUMBER)]: \(.title)"' upstream_issue.json)

          # Using redirect.github.com avoids a reference to the mirror issue in the upstream issue
          upstream_url="https://redirect.github.com/${UPSTREAM_REPO}/issues/${UPSTREAM_ISSUE_NUMBER}"

          {
            echo "> Mirrored from [${UPSTREAM_REPO}#${UPSTREAM_ISSUE_NUMBER}](${upstream_url})"
            echo ""
            echo "## Original description"
            echo ""
            jq -r '.body' upstream_issue.json
          } > new_body.md

          # Sanitize the issue body to avoid GitHub references to upstream
          sed -i -e "s|https://github.com/${UPSTREAM_REPO}/|https://redirect.github.com/${UPSTREAM_REPO}/|g" new_body.md
          # Reference to an issue in the upstream project like `#123` should link to upstream in the mirrored issue
          sed -i -E "s~(^|[^[:alnum:]\[])#([0-9]+)\b~\1[${UPSTREAM_REPO}#\2](https://redirect.github.com/${UPSTREAM_REPO}/issues/\2)~g" new_body.md

          gh issue edit "${MIRROR_ISSUE_NUMBER}" \
            --title "${new_title}" \
            --body-file new_body.md \
            -R "${REPO}"

      - name: Apply stage label
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MIRROR_ISSUE_NUMBER: ${{ inputs.mirror_issue_number }}
          FULLSEND_STAGE: ${{ needs.validate.outputs.fullsend_stage }}
        run: |
          gh issue edit "${MIRROR_ISSUE_NUMBER}" --add-label "ready-to-${FULLSEND_STAGE}" -R "${REPO}"
